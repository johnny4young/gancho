# XcodeGen spec — the source of truth for Gancho.xcodeproj.
# Regenerate with `xcodegen generate` (or `make project`). Do not hand-edit the
# generated .xcodeproj; it is git-ignored. (Pattern inherited from vitrine.)

name: Gancho

options:
  bundleIdPrefix: com.johnny4young.gancho
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  # English is the development language; Spanish ships as a real second locale
  # from day one (enforced by LocalizationTests once UI strings exist).
  developmentLanguage: en
  knownRegions:
    - en
    - es
    - Base

# Project-wide build settings.
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Swift 6 language mode + "approachable concurrency": app modules default to
    # @MainActor isolation. Engine-room packages (GanchoKit/ClipboardCore/GanchoAI)
    # stay nonisolated + Sendable — see docs/ARCHITECTURE.md.
    SWIFT_VERSION: "6.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES

# Local Swift packages hold all feature/core code; app targets stay thin.
packages:
  GanchoKit:
    path: Packages/GanchoKit

targets:
  Gancho:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Apps/GanchoMac
    dependencies:
      - package: GanchoKit
        products:
          - GanchoKit
          - ClipboardCore
          - GanchoAI
          - GanchoDesign
    info:
      path: Apps/GanchoMac/Info.plist
      properties:
        CFBundleDisplayName: Gancho
        # Menu-bar app: no Dock icon (Settings can offer an override later).
        LSUIElement: true
        NSHumanReadableCopyright: "© 2026 Johnny Young. All rights reserved."

  GanchoiOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Apps/GanchoiOS
    dependencies:
      - package: GanchoKit
        products:
          - GanchoKit
          - GanchoAI
          - GanchoDesign
    info:
      path: Apps/GanchoiOS/Info.plist
      properties:
        CFBundleDisplayName: Gancho
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
