# XcodeGen spec — the source of truth for Gancho.xcodeproj.
# Regenerate with `xcodegen generate` (or `make project`). Do not hand-edit the
# generated .xcodeproj; it is git-ignored.

name: Gancho

options:
  bundleIdPrefix: com.johnny4young.gancho
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  # English is the development language; Spanish ships as a real second locale
  # from day one (enforced by LocalizationTests once UI strings exist).
  developmentLanguage: en
  knownRegions:
    - en
    - es
    - Base

# Project-wide build settings.
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Swift 6 language mode + "approachable concurrency": app modules default to
    # @MainActor isolation. Engine-room packages (GanchoKit/ClipboardCore/GanchoAI)
    # stay nonisolated + Sendable — see docs/ARCHITECTURE.md.
    SWIFT_VERSION: "6.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    DEVELOPMENT_TEAM: JGWX5ZT2N2
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES
    # Xcode 16+ builds Debug apps as a thin launcher stub + a .debug.dylib
    # (ENABLE_DEBUG_DYLIB). For a menu-bar agent (LSUIElement) the launcher
    # hands off to the dylib and exits, so Xcode reports "Finished running"
    # and detaches the debugger/console while the agent is still alive in the
    # menu bar — confusing, and it breaks breakpoints for the running app.
    # Force a single Debug binary so Run stays attached and predictable.
    # Only affects Debug builds; Release never produces the dylib.
    ENABLE_DEBUG_DYLIB: NO

# Local Swift packages hold all feature/core code; app targets stay thin.
packages:
  GanchoKit:
    path: Packages/GanchoKit
  # Global hotkey recording + handling (MIT-licensed).
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.3.0

targets:
  Gancho:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    settings:
      base:
        # Shared 1:1 with the iOS app to enable App Store Universal Purchase
        # (buy Pro once, entitled on Mac AND iPhone). Same id, distinct platform.
        PRODUCT_BUNDLE_IDENTIFIER: com.johnny4young.gancho
        # Direct-download (non-App-Store) license: the release DMG build exports
        # GANCHO_COMPILATION_CONDITIONS=GANCHO_DIRECT_DOWNLOAD and the Ed25519
        # signing key. Both stay empty for App Store and from-source builds.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) ${GANCHO_COMPILATION_CONDITIONS}
        GANCHO_LICENSE_SIGNING_KEY: ${GANCHO_LICENSE_SIGNING_KEY}
    sources:
      - path: Apps/GanchoMac
    entitlements:
      path: Apps/GanchoMac/Gancho.entitlements
      properties:
        # Encrypted iCloud history sync (Pro). The container mirrors the
        # bundle id; CKSyncEngine needs push to learn about remote changes.
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.johnny4young.gancho
        com.apple.developer.icloud-services:
          - CloudKit
        aps-environment: development
        # NOTE: the menu-bar helper bridge (status, localized titles, nonce) is
        # content-free and runs over a shared `UserDefaults(suiteName:)`. In
        # Debug / Developer ID that resolves to a shared preferences domain (no
        # entitlement needed). For the sandboxed App Store build, add the
        # `com.apple.security.application-groups` (group.com.johnny4young.gancho)
        # + `com.apple.security.app-sandbox` entitlements at archive time so it
        # resolves to the App Group container — kept out of the baked Debug set
        # because an unprovisioned app-group entitlement makes the UI-test build
        # launch without accessibility.
    dependencies:
      - package: GanchoKit
        products:
          - GanchoKit
          - ClipboardCore
          - GanchoAI
          - GanchoDesign
          - GanchoTelemetry
          - GanchoSync
      - package: KeyboardShortcuts
      # Sparkle auto-updater for the direct-download build. Fetched into Vendor/
      # by scripts/fetch-sparkle.sh (git-ignored); used only behind
      # #if GANCHO_DIRECT_DOWNLOAD. Embedded in the bundle and re-signed on copy.
      - framework: Vendor/Sparkle.framework
        embed: true
        codeSign: true
      # A separate helper process owns the visible menu-bar paperclip. macOS can
      # keep status items hidden for the main bundle identifier even when they
      # remain Accessibility-visible; the helper gives the user a fresh,
      # paintable status-item owner while the main app keeps all private
      # clipboard state.
      - target: GanchoMenuBarHelper
        embed: false
    postBuildScripts:
      - name: Embed the menu-bar helper and its LaunchAgent in the app bundle
        basedOnDependencyAnalysis: true
        inputFiles:
          - "$(BUILT_PRODUCTS_DIR)/GanchoMenuBarHelper"
          - "$(SRCROOT)/Apps/GanchoMenuBarHelper/com.johnny4young.gancho.menubar-helper.plist"
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(EXECUTABLE_FOLDER_PATH)/GanchoMenuBarHelper"
          - "$(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LaunchAgents/com.johnny4young.gancho.menubar-helper.plist"
        script: |
          set -euo pipefail
          # Plain cp (not ditto): the sandboxed user script may only write the
          # declared output paths. Runs before code signing so Xcode seals the
          # bundle with the helper and its LaunchAgent in place.
          cp -f "${BUILT_PRODUCTS_DIR}/GanchoMenuBarHelper" \
            "${TARGET_BUILD_DIR}/${EXECUTABLE_FOLDER_PATH}/GanchoMenuBarHelper"
          chmod 755 "${TARGET_BUILD_DIR}/${EXECUTABLE_FOLDER_PATH}/GanchoMenuBarHelper"
          launch_agents="${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Library/LaunchAgents"
          mkdir -p "${launch_agents}"
          cp -f "${SRCROOT}/Apps/GanchoMenuBarHelper/com.johnny4young.gancho.menubar-helper.plist" \
            "${launch_agents}/com.johnny4young.gancho.menubar-helper.plist"
    info:
      path: Apps/GanchoMac/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Holds the injected Ed25519 license signing key in the direct-download
        # release build; empty (and thus unlicensable) everywhere else.
        GanchoLicenseSigningKey: $(GANCHO_LICENSE_SIGNING_KEY)
        # Sparkle auto-update (direct-download). The appcast is served from
        # GitHub Pages and signed with the EdDSA key whose public half is here;
        # these are inert until the Sparkle framework + updater are wired in.
        SUFeedURL: https://johnny4young.github.io/gancho/appcast.xml
        SUPublicEDKey: Y5DOypMB7sZ04Ffw2gkLr9BlZRHKGWgWu0bB9jEsqmU=
        CFBundleDisplayName: Gancho
        # Deep links keep Settings/panel reachable if macOS or a menu-bar
        # manager hides the status item.
        CFBundleURLTypes:
          - CFBundleURLName: com.johnny4young.gancho
            CFBundleURLSchemes:
              - gancho
        # Menu-bar app: no Dock icon (Settings can offer an override later).
        LSUIElement: true
        NSHumanReadableCopyright: "© 2026 Johnny Young"

  GanchoMenuBarHelper:
    type: tool
    platform: macOS
    deploymentTarget: "26.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johnny4young.gancho.menubar-helper
    # No entitlements in the baked build: the bridge uses a shared preferences
    # domain in Debug / Developer ID. Add the App Group entitlement to the helper
    # at App Store archive time (mirrors the app, see the Gancho target note).
    sources:
      - path: Apps/GanchoMenuBarHelper
        excludes:
          - "com.johnny4young.gancho.menubar-helper.plist"
      - path: Apps/GanchoMac/GanchoMenuBarCommand.swift
      - path: Apps/GanchoMac/GanchoMenuBarBridge.swift

  GanchoiOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    settings:
      base:
        # Same id as the macOS app → Universal Purchase across platforms.
        PRODUCT_BUNDLE_IDENTIFIER: com.johnny4young.gancho
        # The gancho mark (green tile + white hook) from the design system.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    sources:
      - path: Apps/GanchoiOS
      # Capture intents shared with the widget extension (App Intents a
      # widget runs need target membership in both).
      - path: Apps/GanchoShared
    entitlements:
      path: Apps/GanchoiOS/Gancho.entitlements
      properties:
        # Shared with the share extension: capture handoff via SharedInbox.
        com.apple.security.application-groups:
          - group.com.johnny4young.gancho
        # Shared key for the encrypted local store, read by the keyboard and
        # widget extensions (they open the same App Group database).
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.johnny4young.gancho.keys
        # Encrypted iCloud history sync (Pro) — same container as macOS.
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.johnny4young.gancho
        com.apple.developer.icloud-services:
          - CloudKit
        aps-environment: development
    dependencies:
      - package: GanchoKit
        products:
          - GanchoKit
          - ClipboardCore
          - GanchoAI
          - GanchoDesign
          - GanchoTelemetry
          - GanchoSync
      - target: GanchoShare
      - target: GanchoWidgets
      - target: GanchoKeyboard
    info:
      path: Apps/GanchoiOS/Info.plist
      properties:
        AppIdentifierPrefix: $(DEVELOPMENT_TEAM).
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: Gancho
        # Widget deep links use the gancho:// scheme; custom schemes must be
        # registered for the OS to route them to the app (onOpenURL).
        CFBundleURLTypes:
          - CFBundleURLName: com.johnny4young.gancho
            CFBundleURLSchemes:
              - gancho
        UILaunchScreen: {}
        # The "last clip ready to paste" Live Activity (Dynamic Island + lock
        # screen) needs this opt-in; sensitive clips are masked before they
        # reach it.
        NSSupportsLiveActivities: true
        # CKSyncEngine wakes on silent push to pull remote clips.
        UIBackgroundModes:
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # iPad must support every orientation (or be full-screen) for Split
        # View multitasking — the iPad layout wants it.
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  # UI smoke harness (XCTest is allowed ONLY here; unit tests use Swift
  # Testing in the package).
  GanchoUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "26.0"
    settings:
      base:
        # XCTestCase overrides nonisolated members — the app-wide MainActor
        # default does not fit a UI-test bundle.
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
        # macOS 26.5 Gatekeeper blocks unsigned XCUITest runners before they
        # can bootstrap. Generate the bundle plist so Xcode can sign the
        # runner for `make test-ui`; the app build targets stay unsigned.
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: Tests/GanchoUITests
    dependencies:
      - target: Gancho

  # Share-sheet capture: the only iOS path that works from inside other
  # apps, and the loudest proof that capture is intent-only on iOS.
  GanchoShare:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    settings:
      base:
        # Embedded extensions must extend the PARENT app's bundle id
        # (the iOS app is now com.johnny4young.gancho).
        PRODUCT_BUNDLE_IDENTIFIER: com.johnny4young.gancho.share
    sources:
      - path: Apps/GanchoShare
    entitlements:
      path: Apps/GanchoShare/GanchoShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.johnny4young.gancho
    dependencies:
      - package: GanchoKit
        products:
          - ClipboardCore
          - GanchoAI
    info:
      path: Apps/GanchoShare/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: Save to Gancho
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 1

  # Home/lock-screen widgets + the Control Center "Save Clipboard" control.
  # Reads the App Group store read-only; the save button/control reuse the
  # shared SaveClipboardIntent.
  GanchoWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johnny4young.gancho.widgets
    sources:
      - path: Apps/GanchoWidgets
      - path: Apps/GanchoShared
    entitlements:
      path: Apps/GanchoWidgets/GanchoWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.johnny4young.gancho
        # Reads the encrypted store's key from the app's shared keychain group.
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.johnny4young.gancho.keys
    dependencies:
      - package: GanchoKit
        products:
          - GanchoKit
          - ClipboardCore
          - GanchoAI
    info:
      path: Apps/GanchoWidgets/Info.plist
      properties:
        AppIdentifierPrefix: $(DEVELOPMENT_TEAM).
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: Gancho
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  # Custom keyboard: paste any clip or synced pin into any app, with
  # in-keyboard search and a reverse-capture button. Needs Full Access to
  # read the App Group store (justified by an in-keyboard privacy screen).
  GanchoKeyboard:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johnny4young.gancho.keyboard
    sources:
      - path: Apps/GanchoKeyboard
      - path: Apps/GanchoShared
    entitlements:
      path: Apps/GanchoKeyboard/GanchoKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.johnny4young.gancho
        # Reads the encrypted store's key from the app's shared keychain group.
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.johnny4young.gancho.keys
    dependencies:
      - package: GanchoKit
        products:
          - GanchoKit
          - ClipboardCore
          - GanchoAI
          - GanchoDesign
    info:
      path: Apps/GanchoKeyboard/Info.plist
      properties:
        AppIdentifierPrefix: $(DEVELOPMENT_TEAM).
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: Gancho
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            # Full Access: required to read the shared App Group store. The
            # in-keyboard privacy screen explains nothing leaves the device.
            RequestsOpenAccess: true

schemes:
  Gancho:
    build:
      targets:
        Gancho: all
        GanchoUITests: [test]
    run:
      config: Debug
      # Local IAP testing without an App Store account (Xcode StoreKit
      # Testing). Mirror these products in App Store Connect 1:1.
      storeKitConfiguration: Apps/GanchoMac/Gancho.storekit
    test:
      config: Debug
      targets:
        - GanchoUITests
