name: Update Homebrew cask

# Cross-repo half of the tap automation: regenerate the `gancho` cask in
# johnny4young/homebrew-tap from this repo's source template
# (packaging/Casks/gancho.rb) with a released DMG's version and SHA-256.
#
# Unlike Vitrine (whose DMG is built and signed in CI, so its cask bump runs
# inline in the release workflow), Gancho's DMG is built, signed, and notarized
# locally — the Developer ID identity and the EdDSA appcast signature both need
# the maintainer's keys. So run this AFTER the DMG is attached to the release:
#
#   gh workflow run update-cask.yml -f tag=v0.1.0
#
# Requires the TAP_DEPLOY_KEY secret: an SSH deploy key with write access on
# johnny4young/homebrew-tap (scoped to that one repo, unlike a PAT). Vitrine uses
# the same key style for its own bump.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag whose DMG to publish the cask for (e.g. v0.1.0)"
        required: true

permissions:
  contents: read

jobs:
  update-cask:
    name: Bump the gancho cask
    runs-on: ubuntu-latest
    steps:
      - name: Check out gancho (for the cask template)
        uses: actions/checkout@v7

      - name: Resolve version
        id: ref
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          # Strict allow-list: a v-prefixed semver. This also guarantees the
          # value carries no shell metacharacters before it reaches the later
          # download / sed / push steps.
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "::error::tag must be a v-prefixed semver like v0.1.0, got '$TAG'"
            exit 1
          fi
          {
            echo "tag=$TAG"
            echo "version=${TAG#v}"
          } >> "$GITHUB_OUTPUT"

      - name: Download the released DMG and hash it
        id: dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.ref.outputs.tag }}
          VERSION: ${{ steps.ref.outputs.version }}
        run: |
          set -euo pipefail
          asset="Gancho-${VERSION}.dmg"
          if ! gh release download "$TAG" --repo "$REPO" --pattern "$asset" --dir .; then
            echo "::error::$asset is not attached to release $TAG — upload the DMG first."
            exit 1
          fi
          sha="$(sha256sum "$asset" | cut -d' ' -f1)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "$asset -> sha256 $sha"

      - name: Regenerate the cask from the template and push to the tap
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
          CASK_VERSION: ${{ steps.ref.outputs.version }}
          CASK_SHA256: ${{ steps.dmg.outputs.sha }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_DEPLOY_KEY}" ]; then
            echo "::warning::TAP_DEPLOY_KEY is not configured; update the tap manually (docs/RELEASING.md)."
            exit 0
          fi
          KEY_FILE="$(mktemp)"
          printf '%s\n' "${TAP_DEPLOY_KEY}" > "${KEY_FILE}"
          chmod 600 "${KEY_FILE}"
          export GIT_SSH_COMMAND="ssh -i ${KEY_FILE} -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          git clone --depth 1 git@github.com:johnny4young/homebrew-tap.git tap
          # The tap copy is the template from the `cask` line down (the header
          # comment is repo guidance, not cask content), with the published
          # version and checksum substituted for the placeholders.
          awk '/^cask "gancho"/,0' packaging/Casks/gancho.rb \
            | sed -e "s/^  version \".*\"/  version \"${CASK_VERSION}\"/" \
                  -e "s/^  sha256 \".*\"/  sha256 \"${CASK_SHA256}\"/" \
            > tap/Casks/gancho.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage first, then check the *staged* diff: a first-time cask is a new
          # (untracked) file that `git diff` alone would miss, skipping the push.
          git add Casks/gancho.rb
          if git diff --cached --quiet; then
            echo "Tap already serves ${CASK_VERSION}; nothing to push."
            exit 0
          fi
          git commit -m "gancho ${CASK_VERSION}"
          git push origin HEAD:main
          echo "Homebrew tap updated to \`${CASK_VERSION}\`." >> "$GITHUB_STEP_SUMMARY"
