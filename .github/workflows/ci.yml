# CI: lint + package tests + app builds.
# Weekly run catches macOS runner-image drift before it bites a release.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC — image-drift canary

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, package tests & coverage
    # macOS/iOS 26 deployment target + Swift 6.2 need an Xcode 26 runner;
    # macos-latest still carries Xcode 16 (macOS 15 SDK) and cannot build it.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Record toolchain
        run: |
          {
            echo "### Toolchain"
            sw_vers
            xcodebuild -version
            swift --version
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Cache SwiftPM
        uses: actions/cache@v6
        with:
          path: Packages/GanchoKit/.build
          key: spm-${{ runner.os }}-${{ hashFiles('Packages/GanchoKit/Package.swift') }}

      - name: Release metadata sync
        run: make release-check

      - name: Website structure
        run: make site-check

      - name: Install SwiftLint
        run: brew install swiftlint
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"

      - name: Lint (swift-format)
        run: swift format lint --strict --recursive Apps Packages/GanchoKit/Sources Packages/GanchoKit/Tests Tests

      - name: Lint (SwiftLint)
        run: swiftlint lint --strict --reporter github-actions-logging

      - name: Unit tests (Swift Testing, coverage on)
        run: |
          mkdir -p build
          set -o pipefail
          swift test --package-path Packages/GanchoKit --enable-code-coverage \
            2>&1 | tee build/package-test.log
          ./scripts/check-build-warnings.sh build/package-test.log

      # The gate scopes to production sources (everything under Sources/,
      # including the CloudKit adapter and the SwiftUI board editors that unit
      # tests reach only partially), which measures ~80.5% on this branch — so
      # the 80% floor sits just below current coverage, not the wider margin the
      # old all-Sources metric reported. Raise it as the suite grows; never
      # lower it to pass a PR.
      - name: Coverage gate (production sources >=80%)
        env:
          COVERAGE_FLOOR: "80"
        run: |
          ./scripts/check-coverage.sh --self-test
          ./scripts/check-coverage.sh

  build-apps:
    name: Build macOS + iOS apps
    # Deployment target is macOS/iOS 26 — needs an Xcode 26 runner image.
    # macos-latest still lags on Xcode 16 (macOS 15 SDK), so pin macos-26.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Install XcodeGen
        run: brew install xcodegen

      # Fetch the embedded Sparkle.framework (git-ignored Vendor/) so the macOS
      # link step resolves `-framework Sparkle`. Mirrors `make project`.
      - name: Fetch Sparkle framework
        run: ./scripts/fetch-sparkle.sh

      - name: Generate project
        run: xcodegen generate

      - name: StoreKit purchase and entitlement tests
        run: make test-storekit

      - name: Build macOS app
        run: |
          mkdir -p build
          set -o pipefail
          xcodebuild -project Gancho.xcodeproj -scheme Gancho -configuration Debug \
            -resultBundlePath build/mac.xcresult CODE_SIGNING_ALLOWED=NO build \
            2>&1 | tee build/mac-build.log
          ./scripts/check-build-warnings.sh build/mac-build.log

      - name: Build iOS app
        run: |
          set -o pipefail
          xcodebuild -project Gancho.xcodeproj -scheme GanchoiOS -configuration Debug \
            -destination 'generic/platform=iOS' \
            -resultBundlePath build/ios.xcresult CODE_SIGNING_ALLOWED=NO build \
            2>&1 | tee build/ios-build.log
          ./scripts/check-build-warnings.sh build/ios-build.log

      - name: Upload result bundles (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xcresults-${{ github.run_id }}
          path: build/*.xcresult
          retention-days: 7

  # Forward-compat canary: build against the NEXT Xcode/SDK when the runner
  # image carries a beta. Never blocking, never on PRs (weekly + manual only)
  # — betas live exclusively on cloud runners, by repo policy.
  sdk-next-canary:
    name: Xcode beta canary (non-blocking)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Select newest Xcode (betas included)
        run: |
          NEWEST=$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' -print \
            | sort -V | tail -1)
          echo "Selected: $NEWEST" | tee -a "$GITHUB_STEP_SUMMARY"
          sudo xcode-select -s "$NEWEST"
          xcodebuild -version | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build everything against the newest SDK
        run: |
          ./scripts/fetch-sparkle.sh
          xcodegen generate
          swift test --package-path Packages/GanchoKit
          xcodebuild -project Gancho.xcodeproj -scheme Gancho -configuration Debug \
            CODE_SIGNING_ALLOWED=NO build
