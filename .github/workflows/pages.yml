name: Website

# The marketing landing deploys to Cloudflare Pages at the canonical domain
# (gancho.app) on every site change. The signed Sparkle appcast — the SUFeedURL
# the installed base polls — is published by the Release workflow to GitHub Pages
# on each tag (it must be signed over the exact released DMG), NOT here, so a
# landing edit never re-deploys a stale appcast over a newer release's.
#
# One-time setup (owner-gated):
#   - Create the Pages project once:
#       npx wrangler pages project create gancho-web --production-branch=main
#   - Add the custom domain gancho.app to the gancho-web project (Cloudflare
#     dashboard → Pages → Custom domains), with DNS on Cloudflare.
#   - Set repo secrets CLOUDFLARE_API_TOKEN (scoped to Pages:Edit) and
#     CLOUDFLARE_ACCOUNT_ID. Without them the deploy step skips cleanly.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cloudflare:
    name: Deploy landing to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check site structure
        run: ./scripts/check-site.sh

      # Stage the landing WITHOUT the appcast: the appcast lives on GitHub Pages
      # (published by the Release workflow), not on the marketing domain.
      - name: Stage landing
        run: |
          mkdir -p dist-web
          rsync -a --exclude appcast.xml site/ dist-web/

      # Guarded by the Cloudflare secrets so a fork (or this repo before the
      # secrets exist) doesn't fail the workflow.
      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy dist-web --project-name=gancho-web --branch=main
