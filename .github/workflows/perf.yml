# Scale performance harness: 100k-row budgets for search, migration, paging,
# and purge. Weekly + manual — seeding 100k rows does not belong in the
# <10-minute PR loop; perf drift is slow, so weekly catches regressions while
# keeping the macOS (x10) spend down. Run on demand with workflow_dispatch.
name: Performance

on:
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * 1" # weekly, Monday 07:30 UTC

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: Scale budgets (100k clips)
    # Needs the Xcode 26 runner (macOS/iOS 26 + Swift 6.2); macos-latest lags.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Record toolchain
        run: |
          {
            echo "### Toolchain"
            sw_vers
            swift --version
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Cache SwiftPM
        uses: actions/cache@v6
        with:
          path: Packages/GanchoKit/.build
          key: spm-${{ runner.os }}-${{ hashFiles('Packages/GanchoKit/Package.swift') }}

      - name: Run performance harness
        # GitHub's default `run:` shell is bash WITHOUT pipefail, so
        # `make bench | tee` used to exit with tee's 0 and a failing harness
        # kept the job green (this masked a broken budget test for weeks).
        # Capture the status explicitly so the summary still gets the perf
        # trend lines even when the harness fails, THEN propagate the failure.
        run: |
          set -o pipefail
          status=0
          make bench 2>&1 | tee bench.log || status=$?
          {
            echo "### Performance trends"
            echo '```'
            grep '^perf:' bench.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"
