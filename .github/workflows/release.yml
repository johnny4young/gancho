name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  # The signed appcast deploys to GitHub Pages (the SUFeedURL the installed base
  # polls), so the publish job needs the Pages deploy permissions too.
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify tagged build
    # Gancho targets macOS/iOS 26 and Swift 6.2; keep release gates on the same
    # Xcode 26 runner family as CI.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install SwiftLint
        run: brew install swiftlint
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"

      - name: Verify release metadata sync
        run: make release-check

      - name: Verify tag matches MARKETING_VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          marketing_version="$(sed -nE 's/^[[:space:]]*MARKETING_VERSION:[[:space:]]*"?([0-9][0-9A-Za-z.-]*)"?[[:space:]]*$/\1/p' project.yml | head -n1)"
          if [ "$tag_version" != "$marketing_version" ]; then
            echo "::error::Tag v${tag_version} does not match MARKETING_VERSION ${marketing_version} in project.yml."
            exit 1
          fi
          echo "Tag v${tag_version} matches MARKETING_VERSION." >> "$GITHUB_STEP_SUMMARY"

      - name: Validate curated release notes
        run: |
          set -euo pipefail
          notes="docs/releases/${GITHUB_REF_NAME}.md"
          if [ ! -s "$notes" ]; then
            echo "::error::Missing curated release notes at ${notes}."
            exit 1
          fi
          IFS= read -r heading < "$notes"
          if [[ "$heading" != "# Gancho ${GITHUB_REF_NAME}"* ]]; then
            echo "::error::${notes} must start with the tagged version."
            exit 1
          fi
          echo "Curated release notes: \`${notes}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Record toolchain
        run: |
          {
            echo "### Release toolchain"
            echo '```'
            echo "Ref: ${GITHUB_REF_NAME}"
            sw_vers
            xcodebuild -version
            swift --version
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Cache SwiftPM
        uses: actions/cache@v6
        with:
          path: Packages/GanchoKit/.build
          key: spm-${{ runner.os }}-${{ hashFiles('Packages/GanchoKit/Package.swift') }}

      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test

      - name: Build macOS app
        run: make build

      - name: Build iOS app
        run: make build-ios

  publish:
    name: Build, sign & publish the direct-download DMG
    needs: verify
    runs-on: macos-26
    # The appcast deploy targets the github-pages environment.
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Install XcodeGen
        run: brew install xcodegen

      # Import the Developer ID Application certificate into a temporary keychain.
      # A public tag is fail-closed: it never publishes an ad-hoc artifact.
      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERTIFICATE_P12}" ]; then
            echo "::error::MACOS_CERTIFICATE_P12 is required for a public release."
            exit 1
          fi
          keychain="${RUNNER_TEMP}/gancho-signing.keychain-db"
          keychain_password="$(openssl rand -base64 24)"
          cert_path="${RUNNER_TEMP}/developer-id.p12"
          echo "${MACOS_CERTIFICATE_P12}" | base64 --decode > "${cert_path}"
          security create-keychain -p "${keychain_password}" "${keychain}"
          security set-keychain-settings -lut 21600 "${keychain}"
          security unlock-keychain -p "${keychain_password}" "${keychain}"
          security import "${cert_path}" -P "${MACOS_CERTIFICATE_PASSWORD}" \
            -A -t cert -f pkcs12 -k "${keychain}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "${keychain_password}" "${keychain}" >/dev/null
          security list-keychains -d user -s "${keychain}" "$(security default-keychain -d user | tr -d ' \"')"
          rm -f "${cert_path}"
          security find-identity -v -p codesigning "${keychain}"

      - name: Validate and install Developer ID provisioning profile
        env:
          MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
          MACOS_SIGN_TEAM_ID: ${{ secrets.MACOS_SIGN_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_PROVISIONING_PROFILE_BASE64}" ]; then
            echo "::error::MACOS_PROVISIONING_PROFILE_BASE64 is required for production CloudKit sync."
            exit 1
          fi
          if [ -z "${MACOS_SIGN_TEAM_ID}" ]; then
            echo "::error::MACOS_SIGN_TEAM_ID is required for profile validation."
            exit 1
          fi
          profile_path="${RUNNER_TEMP}/Gancho.provisionprofile"
          echo "${MACOS_PROVISIONING_PROFILE_BASE64}" | base64 --decode > "${profile_path}"
          scripts/validate-macos-release-profile.sh "${profile_path}"
          decoded="${RUNNER_TEMP}/Gancho-profile.plist"
          security cms -D -i "${profile_path}" > "${decoded}"
          uuid="$(plutil -extract UUID raw -o - "${decoded}")"
          profile_dir="${HOME}/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "${profile_dir}"
          cp "${profile_path}" "${profile_dir}/${uuid}.provisionprofile"
          echo "MACOS_PROVISIONING_PROFILE=${profile_path}" >> "$GITHUB_ENV"

      - name: Stage App Store Connect notary key
        env:
          MACOS_NOTARY_KEY_P8_BASE64: ${{ secrets.MACOS_NOTARY_KEY_P8 }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_NOTARY_KEY_P8_BASE64}" ]; then
            echo "::notice::MACOS_NOTARY_KEY_P8 is not configured; Apple ID notary credentials may still be used."
            exit 0
          fi
          key_path="${RUNNER_TEMP}/notary-key.p8"
          echo "${MACOS_NOTARY_KEY_P8_BASE64}" | base64 --decode > "${key_path}"
          echo "MACOS_NOTARY_KEY_P8=${key_path}" >> "$GITHUB_ENV"

      # Build the signed, notarized, profile-backed direct-download DMG. Public
      # tags deliberately leave the legacy private license signer unset.
      - name: Build the signed, notarized DMG
        id: dmg
        env:
          VERSION: ${{ github.ref_name }}
          CODE_SIGN_IDENTITY: ${{ secrets.MACOS_CODE_SIGN_IDENTITY }}
          MACOS_SIGN_TEAM_ID: ${{ secrets.MACOS_SIGN_TEAM_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_KEY_ISSUER_ID }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          REQUIRE_PRODUCTION_RELEASE: "1"
        run: |
          set -euo pipefail
          export VERSION="${VERSION#v}"
          make package-dmg
          dmg="dist/Gancho-${VERSION}.dmg"
          {
            echo "version=${VERSION}"
            echo "sha=$(awk '{print $1}' "${dmg}.sha256")"
          } >> "$GITHUB_OUTPUT"

      - name: QA signed release artifact
        env:
          REQUIRE_SYNC_ENTITLEMENTS: "1"
          VERSION: ${{ steps.dmg.outputs.version }}
        run: ./scripts/qa-release.sh "dist/Gancho-${VERSION}.dmg"

      # Sign the exact DMG bytes with Sparkle's EdDSA key and regenerate the
      # appcast. A public tag without an update path is incomplete and fails.
      - name: Generate the signed Sparkle appcast
        id: appcast
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
          VERSION: ${{ steps.dmg.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${SPARKLE_EDDSA_PRIVATE_KEY}" ]; then
            echo "::error::SPARKLE_EDDSA_PRIVATE_KEY is required for a public release."
            exit 1
          fi
          make appcast

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/Gancho-*.dmg
            dist/Gancho-*.dmg.sha256
            dist/gancho-cask-update.txt
            site/appcast.xml
          fail_on_unmatched_files: true
          body_path: docs/releases/${{ github.ref_name }}.md

      # Keep the Homebrew tap in lockstep: regenerate Casks/gancho.rb from the
      # in-repo template with this release's version + sha and push it to the tap
      # over TAP_DEPLOY_KEY. Fails soft (warning) when the key is absent.
      - name: Update the Homebrew tap cask
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
          VERSION: ${{ steps.dmg.outputs.version }}
          SHA256: ${{ steps.dmg.outputs.sha }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_DEPLOY_KEY}" ]; then
            echo "::warning::TAP_DEPLOY_KEY is not configured; bump the cask manually (docs/RELEASING.md)."
            exit 0
          fi
          scripts/update-homebrew-tap.sh \
            --kind cask \
            --name gancho \
            --version "$VERSION" \
            --sha256 "$SHA256" \
            --template packaging/Casks/gancho.rb

      # GitHub Pages serves ONLY the signed appcast (the SUFeedURL the installed
      # base polls) plus a redirect stub at the old site root → the canonical
      # Cloudflare domain. The marketing landing itself deploys to Cloudflare from
      # the Website workflow on site/** pushes.
      - name: Stage appcast + redirect stub for GitHub Pages
        if: ${{ steps.appcast.outcome == 'success' }}
        run: |
          mkdir -p _site
          cp site/appcast.xml _site/appcast.xml
          printf '%s\n' \
            '<!doctype html>' \
            '<meta charset="utf-8">' \
            '<title>Gancho</title>' \
            '<link rel="canonical" href="https://gancho.app/">' \
            '<meta name="robots" content="noindex">' \
            '<meta http-equiv="refresh" content="0; url=https://gancho.app/">' \
            '<script>location.replace("https://gancho.app/" + location.hash)</script>' \
            '<p>Gancho has moved to <a href="https://gancho.app/">gancho.app</a>.</p>' \
            > _site/index.html

      - name: Configure Pages
        if: ${{ steps.appcast.outcome == 'success' }}
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload appcast Pages artifact
        if: ${{ steps.appcast.outcome == 'success' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy appcast to GitHub Pages
        id: pages
        if: ${{ steps.appcast.outcome == 'success' }}
        uses: actions/deploy-pages@v5
