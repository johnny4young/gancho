name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  # The signed appcast deploys to GitHub Pages (the SUFeedURL the installed base
  # polls), so the publish job needs the Pages deploy permissions too.
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify tagged build
    # Gancho targets macOS/iOS 26 and Swift 6.2; keep release gates on the same
    # Xcode 26 runner family as CI.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Verify release metadata sync
        run: make release-check

      - name: Verify tag matches MARKETING_VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          marketing_version="$(sed -nE 's/^[[:space:]]*MARKETING_VERSION:[[:space:]]*"?([0-9][0-9A-Za-z.-]*)"?[[:space:]]*$/\1/p' project.yml | head -n1)"
          if [ "$tag_version" != "$marketing_version" ]; then
            echo "::error::Tag v${tag_version} does not match MARKETING_VERSION ${marketing_version} in project.yml."
            exit 1
          fi
          echo "Tag v${tag_version} matches MARKETING_VERSION." >> "$GITHUB_STEP_SUMMARY"

      - name: Record toolchain
        run: |
          {
            echo "### Release toolchain"
            echo '```'
            echo "Ref: ${GITHUB_REF_NAME}"
            sw_vers
            xcodebuild -version
            swift --version
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Cache SwiftPM
        uses: actions/cache@v6
        with:
          path: Packages/GanchoKit/.build
          key: spm-${{ runner.os }}-${{ hashFiles('Packages/GanchoKit/Package.swift') }}

      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test

      - name: Build macOS app
        run: make build

      - name: Build iOS app
        run: make build-ios

  publish:
    name: Build, sign & publish the direct-download DMG
    needs: verify
    runs-on: macos-26
    # The appcast deploy targets the github-pages environment.
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Install XcodeGen
        run: brew install xcodegen

      # Import the Developer ID Application certificate into a temporary keychain
      # so codesign finds it during the build. Gated on the cert secret: absent
      # (a fork or pre-cert repo) → skipped and the DMG falls back to ad-hoc.
      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERTIFICATE_P12}" ]; then
            echo "::notice::MACOS_CERTIFICATE_P12 is not configured; the DMG will be ad-hoc signed (not notarizable)."
            exit 0
          fi
          keychain="${RUNNER_TEMP}/gancho-signing.keychain-db"
          keychain_password="$(openssl rand -base64 24)"
          cert_path="${RUNNER_TEMP}/developer-id.p12"
          echo "${MACOS_CERTIFICATE_P12}" | base64 --decode > "${cert_path}"
          security create-keychain -p "${keychain_password}" "${keychain}"
          security set-keychain-settings -lut 21600 "${keychain}"
          security unlock-keychain -p "${keychain_password}" "${keychain}"
          security import "${cert_path}" -P "${MACOS_CERTIFICATE_PASSWORD}" \
            -A -t cert -f pkcs12 -k "${keychain}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "${keychain_password}" "${keychain}" >/dev/null
          security list-keychains -d user -s "${keychain}" "$(security default-keychain -d user | tr -d ' \"')"
          rm -f "${cert_path}"
          security find-identity -v -p codesigning "${keychain}"

      - name: Stage App Store Connect notary key
        env:
          MACOS_NOTARY_KEY_P8_BASE64: ${{ secrets.MACOS_NOTARY_KEY_P8 }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_NOTARY_KEY_P8_BASE64}" ]; then
            echo "::notice::MACOS_NOTARY_KEY_P8 is not configured; Apple ID notary credentials may still be used."
            exit 0
          fi
          key_path="${RUNNER_TEMP}/notary-key.p8"
          echo "${MACOS_NOTARY_KEY_P8_BASE64}" | base64 --decode > "${key_path}"
          echo "MACOS_NOTARY_KEY_P8=${key_path}" >> "$GITHUB_ENV"

      # Build the signed, notarized direct-download DMG. GANCHO_LICENSE_SIGNING_KEY
      # (an Ed25519 private key) is interpolated into the Info.plist by XcodeGen so
      # the build can mint + verify Pro activation tokens. Empty → the build stays
      # Free and the paywall shows an honest "Pro is coming soon". The signing /
      # notary env vars are read by scripts/package-macos-dmg.sh, which degrades to
      # an unsigned dev artifact when they are absent.
      - name: Build the signed, notarized DMG (license flavor)
        id: dmg
        env:
          VERSION: ${{ github.ref_name }}
          CODE_SIGN_IDENTITY: ${{ secrets.MACOS_CODE_SIGN_IDENTITY }}
          MACOS_SIGN_TEAM_ID: ${{ secrets.MACOS_SIGN_TEAM_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_KEY_ISSUER_ID }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          GANCHO_LICENSE_SIGNING_KEY: ${{ secrets.GANCHO_LICENSE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          export VERSION="${VERSION#v}"
          make package-dmg
          dmg="dist/Gancho-${VERSION}.dmg"
          {
            echo "version=${VERSION}"
            echo "sha=$(awk '{print $1}' "${dmg}.sha256")"
          } >> "$GITHUB_OUTPUT"

      # Sign the DMG with the EdDSA key (from a secret) and regenerate the appcast
      # so direct-download users update N → N+1. Gated on the key like the signing
      # steps: without it the release still publishes a DMG, just no update entry.
      - name: Generate the signed Sparkle appcast
        id: appcast
        if: ${{ env.SPARKLE_EDDSA_PRIVATE_KEY != '' }}
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
          VERSION: ${{ steps.dmg.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: make appcast

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/Gancho-*.dmg
            dist/Gancho-*.dmg.sha256
            dist/gancho-cask-update.txt
            site/appcast.xml
          generate_release_notes: true

      # Keep the Homebrew tap in lockstep: regenerate Casks/gancho.rb from the
      # in-repo template with this release's version + sha and push it to the tap
      # over TAP_DEPLOY_KEY. Fails soft (warning) when the key is absent.
      - name: Update the Homebrew tap cask
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
          VERSION: ${{ steps.dmg.outputs.version }}
          SHA256: ${{ steps.dmg.outputs.sha }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_DEPLOY_KEY}" ]; then
            echo "::warning::TAP_DEPLOY_KEY is not configured; bump the cask manually (docs/RELEASING.md)."
            exit 0
          fi
          scripts/update-homebrew-tap.sh \
            --kind cask \
            --name gancho \
            --version "$VERSION" \
            --sha256 "$SHA256" \
            --template packaging/Casks/gancho.rb

      # GitHub Pages serves ONLY the signed appcast (the SUFeedURL the installed
      # base polls) plus a redirect stub at the old site root → the canonical
      # Cloudflare domain. The marketing landing itself deploys to Cloudflare from
      # the Website workflow on site/** pushes.
      - name: Stage appcast + redirect stub for GitHub Pages
        if: ${{ steps.appcast.outcome == 'success' }}
        run: |
          mkdir -p _site
          cp site/appcast.xml _site/appcast.xml
          printf '%s\n' \
            '<!doctype html>' \
            '<meta charset="utf-8">' \
            '<title>Gancho</title>' \
            '<link rel="canonical" href="https://gancho.app/">' \
            '<meta name="robots" content="noindex">' \
            '<meta http-equiv="refresh" content="0; url=https://gancho.app/">' \
            '<script>location.replace("https://gancho.app/" + location.hash)</script>' \
            '<p>Gancho has moved to <a href="https://gancho.app/">gancho.app</a>.</p>' \
            > _site/index.html

      - name: Configure Pages
        if: ${{ steps.appcast.outcome == 'success' }}
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload appcast Pages artifact
        if: ${{ steps.appcast.outcome == 'success' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy appcast to GitHub Pages
        id: pages
        if: ${{ steps.appcast.outcome == 'success' }}
        uses: actions/deploy-pages@v5
